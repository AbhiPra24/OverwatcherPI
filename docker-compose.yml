# OverwatcherPI — full stack compose
# See docs/docker.md for pre-flight and migration steps.
services:

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: overwatcher-bot
    network_mode: host          # required: nmap ARP discovery + BlueZ D-Bus
    security_opt:
      - apparmor:unconfined
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/dbus:/var/run/dbus  # BlueZ D-Bus passthrough (see docs/docker.md)
      - /usr/bin/vcgencmd:/usr/bin/vcgencmd:ro  # Pi throttling/temp queries
      - /var/log/auth.log:/var/log/auth.log:ro  # SSH watcher
    devices:
      - /dev/vcio:/dev/vcio  # required by vcgencmd
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import sqlite3, time, sys; \
         conn = sqlite3.connect('/app/data/netmon.db'); \
         rows = conn.execute(\"SELECT last_run_at FROM job_heartbeats WHERE job_name IN ('fast_sweep', 'service_watchdog', 'resource_health')\").fetchall(); \
         sys.exit(0 if len(rows) == 3 and all((time.time()-r[0]) < 900 for r in rows) else 1)"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 2m

  sniffer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: overwatcher-sniffer
    user: root
    command: python bin/sniffer_daemon.py
    network_mode: host          # required: must see real LAN ARP/DHCP traffic
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "sniffer_daemon.py"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: overwatcher-dashboard
    # No ports: — intentionally not published to host.
    # Caddy reaches it via the internal network only.
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    # Exposed to localhost only so Caddy on host network can reach it
    ports:
      - "127.0.0.1:8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: overwatcher-caddy
    network_mode: host
    volumes:
      - ./dashboard/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - dashboard
    restart: unless-stopped
